<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MooniVS - Perfil & Login</title>
    <style>
        /* ESTILO ESPACIAL UNIVS */
        body { 
            background: radial-gradient(circle at center, #001d3d 0%, #000000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #espaco {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* CONTAINER CENTRAL */
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 { font-size: 2.5rem; text-shadow: 0 0 15px #00d4ff; margin-bottom: 20px; }

        /* BOTÕES */
        button { 
            background: rgba(0, 212, 255, 0.1); 
            color: #00d4ff; 
            border: 2px solid #00d4ff; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 50px;
            transition: all 0.3s;
            margin: 10px 5px;
        }

        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }
        
        .btn-sair { border-color: #ff4b4b; color: #ff4b4b; }
        .btn-sair:hover { background: #ff4b4b; color: white; box-shadow: 0 0 20px #ff4b4b; }

        /* PERFIL ESTILO NINTENDO */
        #user-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #00d4ff;
            margin-bottom: 15px;
            box-shadow: 0 0 15px #00d4ff;
        }

        .info-box {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .info-box p { margin: 5px 0; font-size: 0.9rem; color: #ccc; }
        .info-box b { color: #00d4ff; }
    </style>
</head>
<body>

    <canvas id="espaco"></canvas>

    <div class="container">
        <div id="area-login">
            <h1>UniVS Console</h1>
            <p>Identifique-se para acessar seus cristais.</p>
            <button id="btnLogin">ENTRAR COM GOOGLE</button>
        </div>

        <div id="area-perfil" style="display: none;">
            <img id="user-photo" src="" alt="Avatar">
            <h2 id="user-name" style="margin: 0;">---</h2>
            
            <div class="info-box">
                <p>Status: <b>Operador UniVS</b></p>
                <p>Membro desde: <b id="user-date">---</b></p>
                <p>Cristais de Lua: <b id="user-points-profile">0</b></p>
            </div>

            <button onclick="window.location.href='../../index.html'">Voltar ao Home</button>
            <button id="btnLogout" class="btn-sair">SAIR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('espaco');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let stars = [];
        for(let i=0; i<250; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8,
                speedY: Math.random() * 0.4 + 0.1,
                speedX: (Math.random() - 0.5) * 0.1,
                opacity: Math.random(),
                blinkSpeed: Math.random() * 0.02
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.blinkSpeed;
                if(s.opacity > 1 || s.opacity < 0) s.blinkSpeed *= -1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.opacity)})`;
                ctx.fill();
                s.y += s.speedY; s.x += s.speedX;
                if(s.y > canvas.height) { s.y = -5; s.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1YeizxgrQm1miA8rQZXQCBCepdqZEZ6Y",
            authDomain: "univs-5f408.firebaseapp.com",
            projectId: "univs-5f408",
            storageBucket: "univs-5f408.firebasestorage.app",
            messagingSenderId: "1044813133461",
            appId: "1:1044813133461:web:07cb61b836202c239d4d9c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            const areaLogin = document.getElementById('area-login');
            const areaPerfil = document.getElementById('area-perfil');

            if (user) {
                areaLogin.style.display = 'none';
                areaPerfil.style.display = 'block';

                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                
                // Formata data estilo Nintendo
                const data = new Date(parseInt(user.metadata.createdAt)).toLocaleDateString('pt-BR');
                document.getElementById('user-date').innerText = data;

                // Pontos salvos
                document.getElementById('user-points-profile').innerText = localStorage.getItem('userPoints') || 0;
            } else {
                areaLogin.style.display = 'block';
                areaPerfil.style.display = 'none';
            }
        });

        document.getElementById('btnLogin').onclick = () => {
            signInWithPopup(auth, provider).catch(e => alert("Erro: " + e.message));
        };

        document.getElementById('btnLogout').onclick = () => {
            signOut(auth).then(() => location.reload());
        };
    </script>
</body>
</html>
