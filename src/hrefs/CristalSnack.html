<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit-Games | Apples - Download</title>
    <style>
        /* --- RESET E BASE ESPACIAL --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
        }

        /* --- CLASSE GAMEAPP (O FUNDO DO MODELO PRO) --- */
        .GameApp {
            background-image: linear-gradient(135deg, rgb(30, 20, 80), rgb(120, 40, 100));
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            color: white;
        }

        /* --- BARRA SUPERIOR FIXA --- */
        .bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .HomeButton {
            width: 50px;
            height: 50px;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .HomeButton:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 10px #00ffff);
        }

        /* --- PAINEL DE DOWNLOADS (GLASSMORPHISM) --- */
        .elements {
            position: relative;
            z-index: 10;
            background-color: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Suporte para Safari */
            
            width: 90%;
            max-width: 450px;
            margin-top: 100px;
            margin-bottom: 50px;
            padding: 40px;
            
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        /* IMAGEM DO JOGO */
        .img_edit {
            border-radius: 15px;
            width: 100%;
            max-width: 220px;
            height: auto;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            color: white;
        }

        h3 {
            color: #00ffff;
            margin-top: 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 4px;
        }

        /* BOTÃO DE DOWNLOAD */
        .downloadButton {
            width: 130px;
            height: auto;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }

        .downloadButton:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #00ffff);
        }

        /* --- CANVAS DAS ESTRELAS --- */
        #espaco {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>
<body class="GameApp">

    <canvas id="espaco"></canvas>

    <div class="bar">
        <a href="../../index.html">
            <img src="../../imgs/button_home.png" alt="Home" class="HomeButton">
        </a>
    </div>

    <div class="elements">
        <img src="../../imgs/Cristal_snack.png" class="img_edit" alt="Cristal snack Game Cover">
        
        <h1>Downloads</h1>
        
        <div>
            <h3>Windows</h3>
            <a href="../../Archines/CristalSnack - windows.rar"> 
                <img src="../../imgs/button_download.png" class="downloadButton" alt="Download Now"> 
            </a>
        </div>

        <p style="font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 40px; letter-spacing: 2px;">
            BIT-GAMES | SECURE SYSTEM
        </p>
    </div>

    <script>
        // --- LÓGICA DAS ESTRELAS (MESMA DO MODELO PRO) ---
        const canvas = document.getElementById('espaco');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let stars = [];
        // Criando estrelas com as propriedades exatas do modelo Pro
        for(let i=0; i<250; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8,
                speedY: Math.random() * 0.4 + 0.1, 
                speedX: (Math.random() - 0.5) * 0.1, // A deriva lateral suave
                opacity: Math.random(),
                blinkSpeed: Math.random() * 0.02 
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(s => {
                // Cintilação
                s.opacity += s.blinkSpeed;
                if(s.opacity > 1 || s.opacity < 0) s.blinkSpeed *= -1;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.opacity)})`;
                ctx.fill();

                // Movimento
                s.y += s.speedY;
                s.x += s.speedX;

                // Reset de posição
                if(s.y > canvas.height) {
                    s.y = -5;
                    s.x = Math.random() * canvas.width;
                }
                if(s.x > canvas.width) s.x = 0;
                if(s.x < 0) s.x = canvas.width;
            });
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
